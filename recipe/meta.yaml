{% set name = "starfile" %}
{% set version = "0.5.13" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/starfile-{{ version }}.tar.gz
  sha256: c9562960b06558a35c12e0bd1b8a30b71c4b676733a8b9f222c8ee94a152dc15

build:
  entry_points:
    - starfile = starfile.__main__:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools-scm
  run:
    - numpy
    - pandas
    - python >={{ python_min }}
    - typing-extensions

test:
  imports:
    - starfile
  commands:
    - pip list
    - pip check
    - starfile --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/starfile
  summary: STAR file reading and writing in python.
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/alisterburt/starfile

extra:
  recipe-maintainers:
    - alisterburt
    - goanpeca
